# PILOT ONLY: validates Dependabot's uv ecosystem support end-to-end
# (see feat/lowest-direct-dependabot pilot). Remove or replace with the
# canonical cava-devops/templates/dependabot.yml once the pilot passes.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "lockfile-only"
    labels:
      - "dependencies"
    allow:
      - dependency-name: "certifi"
