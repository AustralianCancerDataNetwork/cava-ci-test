name: Release Update
# On PR merge: sync the PR description from the merge commit body, then
# update the draft release. The sync must complete before drafter reads $BODY.
on:
  pull_request:
    types: [closed]

jobs:
  sync-description:
    if: github.event.pull_request.merged == true
    uses: AustralianCancerDataNetwork/cava-devops/.github/workflows/sync-pr-description.yml@main

  draft:
    needs: [sync-description]
    # Run only if sync succeeded; skip-on-unmerged-close is handled by sync's own `if`.
    if: needs.sync-description.result == 'success'
    uses: AustralianCancerDataNetwork/cava-devops/.github/workflows/release-drafter.yml@main
    secrets: inherit
